<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador | Intercambios Pamilon</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- NAVBAR con logo pequeño -->
 <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="imagenes/logo.png" alt="Logo" class="logo-navbar me-3">
      <span class="brand-text">Intercambios Pamilon</span>
    </a>

  </div>
</nav>

  <div class="container main-wrap">
    <div class="row justify-content-center">
      <!-- Más ancho en pantallas grandes -->
      <div class="col-12 col-md-10 col-lg-8 col-xl-7">

        <div class="app-card p-4 p-md-5">
          <div class="text-center mb-4">
            <h1 class="h3 page-title mb-1">Organizar intercambio</h1>
            <p class="page-subtitle mb-0">Agrega organizador y participantes para comenzar.</p>
          </div>

          <!-- Organizador -->
          <div class="mb-4">
            <label class="form-label fw-semibold">¿Quién organiza el intercambio?</label>
            <input type="text" id="organizerName" class="form-control mb-2" placeholder="Tu nombre (ej. Gina)">

            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="includeOrganizer" checked>
              <label class="form-check-label">
                Inclúyeme en el sorteo
              </label>
            </div>
          </div>

          <hr class="my-4">

          <!-- Participantes -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Participantes</label>

            <div class="input-group mb-3">
              <input type="text" id="participantName" class="form-control" placeholder="Nombre del participante">
              <button class="btn btn-primary px-4" id="addParticipant" type="button">+</button>
            </div>

            <div class="list-group mb-2" id="participantsList"></div>
            <p class="text-muted small mb-0">Tip: agrega todos los nombres. No hay límite.</p>
          </div>

          <div class="d-grid mt-4">
            <button class="btn btn-success" id="continueToExclusions" type="button">
              Continuar
            </button>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script src="js/organizador.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
