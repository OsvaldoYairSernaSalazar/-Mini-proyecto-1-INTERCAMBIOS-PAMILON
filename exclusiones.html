<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusiones | Intercambios Pamilon</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- NAVBAR con logo pequeño -->
 <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="imagenes/logo.png" alt="Logo" class="logo-navbar me-3">
      <span class="brand-text">Intercambios Pamilon</span>
    </a>

  </div>
</nav>

  <div class="container main-wrap">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-7">

        <div class="app-card p-4 p-md-5">
          <div class="text-center mb-4">
            <h1 class="h3 page-title mb-1">Exclusiones</h1>
            <p class="page-subtitle mb-0">Evita combinaciones no permitidas en el sorteo.</p>
          </div>

          <!-- Pregunta inicial -->
          <div id="questionSection">
            <p class="fw-bold mb-1">¿Quieres excluir ciertos sorteos?</p>
            <p class="text-muted mb-3">Ejemplo: evitar que parejas o familiares se saquen entre sí.</p>

            <div class="d-grid gap-2">
              <button class="btn btn-outline-secondary" id="noExclusions" type="button">
                No establecer exclusiones
              </button>

              <button class="btn btn-primary" id="setExclusions" type="button">
                Establecer exclusiones
              </button>
            </div>
          </div>

          <!-- Lista de exclusiones -->
          <div id="exclusionsSection" class="d-none mt-4">
            <div class="participants-scroll">
              <div id="participantsContainer"></div>
            </div>
            <p class="text-muted small mt-2 mb-0">
              Mantén presionado Ctrl (o en celular toca varios) para seleccionar múltiples nombres.
            </p>
          </div>

          <div class="d-grid mt-4">
            <button class="btn btn-success" id="continueBtn" type="button">
              Continuar
            </button>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script src="js/exclusiones.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
