<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusiones | Intercambios Pamilon</title>

<link rel="icon" type="image/png" href="imagenes/logo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/exclusiones.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container">
    
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="imagenes/logo.png" alt="Logo" class="logo-navbar me-3">
      <span class="brand-text">Intercambios Pamilon</span>
    </a>

  </div>
</nav>


<div class="container main-wrap">

<div class="row justify-content-center">
<div class="col-12 col-md-10 col-lg-8 col-xl-7">

<div class="app-card p-4 p-md-5">

<div class="text-center mb-4">
<h1 class="h3 page-title mb-1">Exclusiones</h1>
<p class="page-subtitle mb-0">
Evita combinaciones no permitidas en el sorteo.
</p>
</div>


<!-- Pregunta inicial -->

<div id="questionSection">

<p class="fw-bold mb-1">¿Quieres excluir ciertos sorteos?</p>

<p class="text-muted mb-3">
Ejemplo: evitar que parejas o familiares se saquen entre sí.
</p>

<div class="d-grid gap-2">

<button class="btn btn-outline-secondary" id="noExclusions" type="button">
No establecer exclusiones
</button>

<button class="btn btn-primary" id="setExclusions" type="button">
Establecer exclusiones
</button>

</div>

</div>


<!-- Sección Drag and Drop -->

<div id="exclusionsSection" class="d-none mt-4">

<div class="row g-3">

<!-- Lista de participantes -->

<div class="col-md-5">

<h6 class="fw-bold">Participantes</h6>

<div id="dragParticipants" class="drag-list"></div>

<p class="small text-muted mt-2">
Arrastra los participantes hacia las zonas de exclusión.
</p>

</div>


<!-- Zonas de exclusión -->

<div class="col-md-7">

<h6 class="fw-bold">Exclusiones</h6>

<div id="participantsContainer"></div>

</div>

</div>

</div>


<div class="d-grid mt-4">

<button class="btn btn-success" id="continueBtn" type="button">
Continuar
</button>

</div>


</div>
</div>
</div>
</div>

<script src="js/exclusiones.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
