<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipo de Evento | Intercambios Pamilon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/tipo_evento.css"> 
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="imagenes/logo.png" alt="Logo" class="logo-navbar me-3">
                <span class="brand-text">Intercambios Pamilon</span>
            </a>
        </div>
    </nav>

    <div class="container main-wrap">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-7">

                <div class="app-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 page-title mb-1">¿Para qué vas a sortear nombres?</h1>
                        <p class="page-subtitle mb-0">Selecciona el motivo de tu intercambio para personalizarlo.</p>
                    </div>

                    <div class="participants-scroll mt-4">
                        <div class="eventos-grid">
                            <button type="button" class="btn-evento full-width">Día de San Valentín</button>
                            
                            <button type="button" class="btn-evento">Intercambio</button>
                            <button type="button" class="btn-evento">Navidad</button>
                            <button type="button" class="btn-evento">Día del Niño</button>
                            <button type="button" class="btn-evento">Día de la Madre</button>
                            <button type="button" class="btn-evento">Cumpleaños</button>
                            <button type="button" class="btn-evento">Aniversario</button>
                        </div>
                        
                        <div class="mt-3">
                            <button type="button" class="btn btn-link p-0 fw-bold text-decoration-none" style="color: var(--brand-1);">
                                Mostrar más
                            </button>
                        </div>
                    </div>

                    <div class="d-flex gap-3 mt-5">
                        <button class="btn-previo" type="button" onclick="window.history.back()">
                            <span>‹</span>
                        </button>
                        <button class="btn btn-success flex-grow-1" id="continueBtn" type="button">
                            Continuar
                        </button>
                    </div>

                </div> </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/tipoEvento.js"></script>
</body>
</html>
