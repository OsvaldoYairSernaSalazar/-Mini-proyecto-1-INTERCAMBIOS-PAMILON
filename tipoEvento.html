<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tipo de Evento | Intercambios Pamilon</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/tipoEvento.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="imagenes/logo.png" alt="Logo" class="logo-navbar me-3" />
          <span class="brand-text">Intercambios Pamilon</span>
        </a>
      </div>
    </nav>

    <div class="container main-wrap">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8 col-xl-7">
          <div class="app-card p-4 p-md-5">
            <div class="text-center mb-4">
              <h1 class="h3 page-title mb-1">
                ¿Para qué vas a sortear nombres?
              </h1>

              <p class="page-subtitle mb-0">
                Selecciona el motivo de tu intercambio para personalizarlo.
              </p>
            </div>

            <div class="row g-3 eventos-grid">
              <div class="col-6">
                <button type="button" class="btn-evento">
                  <div class="evento-card">
                    <div class="evento-icon">💖</div>
                    <div class="evento-texto">Día de San Valentín</div>
                  </div>
                </button>
              </div>

              <div class="col-6">
                <button type="button" class="btn-evento">
                  <div class="evento-card">
                    <div class="evento-icon">🎁</div>
                    <div class="evento-texto">Intercambio</div>
                  </div>
                </button>
              </div>

              <div class="col-6">
                <button type="button" class="btn-evento">
                  <div class="evento-card">
                    <div class="evento-icon">🎄</div>
                    <div class="evento-texto">Navidad</div>
                  </div>
                </button>
              </div>

              <div class="col-6">
                <button type="button" class="btn-evento">
                  <div class="evento-card">
                    <div class="evento-icon">🧸</div>
                    <div class="evento-texto">Día del Niño</div>
                  </div>
                </button>
              </div>

              <div class="col-6">
                <button type="button" class="btn-evento">
                  <div class="evento-card">
                    <div class="evento-icon">🌷</div>
                    <div class="evento-texto">Día de la Madre</div>
                  </div>
                </button>
              </div>

              <div class="col-6">
                <button type="button" class="btn-evento">
                  <div class="evento-card">
                    <div class="evento-icon">🎂</div>
                    <div class="evento-texto">Cumpleaños</div>
                  </div>
                </button>
              </div>

              <div class="col-6">
                <button type="button" class="btn-evento">
                  <div class="evento-card">
                    <div class="evento-icon">💍</div>
                    <div class="evento-texto">Aniversario</div>
                  </div>
                </button>
              </div>
            </div>

            <div class="text-center mt-3">
              <button
                type="button"
                class="btn btn-link fw-semibold text-decoration-none"
                id="mostrarMasBtn"
                style="color: var(--brand-1)"
              >
                ➕ Crear evento personalizado
              </button>
            </div>

            <div class="d-flex gap-3 mt-5">
              <button
                class="btn-previo"
                type="button"
                onclick="window.history.back()"
              >
                ‹
              </button>

              <button class="btn btn-success flex-grow-1" id="continueBtn">
                Continuar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/tipoEvento.js"></script>
  </body>
</html>
```
